name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev + geo extras)
        run: pip install -e ".[dev,geo]"

      # This repo's real CHIRPS/ECMWF data (~2.4GB, data/) isn't committed
      # (see .gitignore) and isn't available here, so tests/test_io_preprocess.py
      # and tests/test_regrid_qdm.py (marked `requires_data`, see pyproject.toml)
      # are excluded. tests/test_verify.py runs in full -- it's entirely
      # synthetic and doesn't touch data/.
      - name: Run CI-safe test suite (excludes requires_data)
        run: python -m pytest -m "not requires_data" -v
